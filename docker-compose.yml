services:
  postgres:
    image: postgres:16-alpine
    container_name: nupevid_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-nupevid}
      POSTGRES_USER: ${DB_USER:-nupevid_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nupevid_pass_change_me}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=pt_BR.UTF-8"
      TZ: America/Porto_Velho
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - nupevid_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nupevid_user} -d ${DB_NAME:-nupevid}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  nupevid_network:
    driver: bridge
