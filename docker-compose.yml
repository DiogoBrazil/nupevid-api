services:
  postgres:
    image: postgres:16-alpine
    container_name: nupevid_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-nupevid}
      POSTGRES_USER: ${DB_USER:-nupevid_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nupevid_pass_change_me}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=pt_BR.UTF-8"
      TZ: America/Porto_Velho
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - nupevid_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-nupevid_user} -d ${DB_NAME:-nupevid}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: nupevid_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${DB_USER:-nupevid_user}:${DB_PASSWORD:-nupevid_pass_change_me}@postgres:5432/${DB_NAME:-nupevid}
      SERVER_ADDR: 0.0.0.0:8080
      JWT_SECRET: ${JWT_SECRET:-default_secret_key_change_me}
      JWT_ISSUER: ${JWT_ISSUER:-nupevid-api}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-nupevid-api}
      API_KEY: ${API_KEY:-default_api_key_change_me}
      DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-20}
      ENABLE_BOOTSTRAP_ROOT: ${ENABLE_BOOTSTRAP_ROOT:-false}
      RUST_LOG: info
    networks:
      - nupevid_network
      - dev_default

volumes:
  postgres_data:
    driver: local

networks:
  nupevid_network:
    driver: bridge
  dev_default:
    external: true
