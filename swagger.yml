  # === PROTECTIVE MEASURE ENDPOINTS ===
  /protective-measures:
    get:
      tags:
        - "Protective Measures"
      summary: "Listar todas as medidas protetivas"
      description: "Retorna lista de medidas protetivas com filtros baseados nas permissões"
      operationId: "getAllProtectiveMeasures"
      security:
        - bearerAuth: []
          api_key: []
      parameters:
        - name: "page"
          in: "query"
          required: false
          schema:
            type: integer
            example: 1
          description: "Número da página (1-based)"
        - name: "page_size"
          in: "query"
          required: false
          schema:
            type: integer
            example: 10
          description: "Quantidade de itens por página (max 200)"
        - name: "include_complement_for_entities"
          in: "query"
          required: false
          schema:
            type: boolean
            example: false
          description: "Quando true, retorna ProtectiveMeasureWithExtensionsAndEntities (com victim, offender, court_district). Quando false/omitido, retorna ProtectiveMeasureWithExtensions."
      responses:
        "200":
          description: "Lista de medidas protetivas retornada com sucesso"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  data:
                    type: array
                    items:
                      oneOf:
                        - $ref: "#/components/schemas/ProtectiveMeasureWithExtensions"
                        - $ref: "#/components/schemas/ProtectiveMeasureWithExtensionsAndEntities"
                  page:
                    type: integer
                    example: 1
                  page_size:
                    type: integer
                    example: 10
                  total_items:
                    type: integer
                    example: 100
                  total_pages:
                    type: integer
                    example: 10
        "401":
          description: "Token JWT ausente, inválido ou expirado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Unauthorized"
                message: "Unauthorized"
                status_code: 401
        "403":
          description: "Sem permissão para listar medidas protetivas"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Forbidden"
                message: "Forbidden: insufficient permissions"
                status_code: 403

    post:
      tags:
        - "Protective Measures"
      summary: "Criar nova medida protetiva"
