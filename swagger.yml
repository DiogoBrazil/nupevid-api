        assaults_children:
          type: boolean
        was_drunk_during_assault:
          type: boolean
        victim_id:
          type: string
          format: uuid
        offender_id:
          type: string
          format: uuid
        extensions:
          type: array
          description: "Prorrogações opcionais a serem criadas junto com a medida"
          items:
