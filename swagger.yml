              function: "Patroller"
      responses:
        "200":
          description: "Membro adicionado com sucesso"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  data:
                    $ref: "#/components/schemas/WorkSessionMember"
