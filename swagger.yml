openapi: 3.0.3
info:
  title: "NUPEVID API"
  description: "API do sistema NUPEVID para gerenciamento de vítimas, atendimentos e medidas protetivas"
  version: "1.0.0"
  contact:
    name: "Equipe NUPEVID"

servers:
  - url: "/api/v1"
    description: "Servidor Principal"

tags:
  - name: "Auth"
    description: "Autenticação e autorização"
  - name: "Users"
    description: "Gerenciamento de usuários"
  - name: "Cities"
    description: "Gerenciamento de cidades"
  - name: "Victims"
    description: "Gerenciamento de vítimas"
  - name: "Offenders"
    description: "Gerenciamento de agressores"
  - name: "Protective Measures"
    description: "Gerenciamento de medidas protetivas"
  - name: "Attendances"
    description: "Gerenciamento de atendimentos"

security:
  - bearerAuth: []
  - api_key: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Autenticação via Token JWT obtido no endpoint /auth/login"
    api_key:
      type: apiKey
      in: header
      name: api_key
      description: "Chave de API configurada nas variáveis de ambiente"

  schemas:
    # --- Error Responses ---
    Error:
      type: object
      properties:
        error:
          type: string
          description: "Tipo de erro"
        message:
          type: string
          description: "Mensagem de erro descritiva"
        status_code:
          type: integer
          format: int32
          description: "Código de status HTTP"

    ApiResponse:
      type: object
      properties:
        status:
          type: integer
          format: int32
          description: "Código de status da resposta"
        data:
          type: object
          description: "Dados da resposta"

    # --- Auth Schemas ---
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "admin@nupevid.com"
        password:
          type: string
          format: password
          example: "SecurePassword123!"

    LoginResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        data:
          type: object
          properties:
            token:
              type: string
              description: "Token JWT para autenticação"
            id:
              type: string
              format: uuid
              description: "ID do usuário"
            full_name:
              type: string
              description: "Nome completo do usuário"
            email:
              type: string
              format: email
              description: "Email do usuário"

    # --- User Schemas ---
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        rank:
          type: string
          example: "CAP PM"
        registration:
          type: string
          example: "100000001"
        full_name:
          type: string
          example: "João Silva"
        profile:
          type: string
          enum: ["ROOT", "CITY_ADMIN", "CITY_USER"]
        email:
          type: string
          format: email
        city_id:
          type: string
          format: uuid
          nullable: true
        permission_policies:
          type: object
          description: "Políticas de permissão do usuário"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        is_deleted:
          type: boolean

    CreateUserRequest:
      type: object
      required:
        - rank
        - registration
        - full_name
        - profile
        - email
        - password
      properties:
        rank:
          type: string
          example: "CB PM"
        registration:
          type: string
          pattern: "^1000[0-9]{5}$"
          example: "100000001"
        full_name:
          type: string
          example: "Maria Santos"
        profile:
          type: string
          enum: ["ROOT", "CITY_ADMIN", "CITY_USER"]
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        city_id:
          type: string
          format: uuid
          nullable: true
        permission_policies:
          type: object
          description: "Políticas de permissão opcionais"

    UpdateUserRequest:
      type: object
      required:
        - rank
        - registration
        - full_name
        - profile
        - email
      properties:
        rank:
          type: string
        registration:
          type: string
        full_name:
          type: string
        profile:
          type: string
          enum: ["ROOT", "CITY_ADMIN", "CITY_USER"]
        email:
          type: string
          format: email
        city_id:
          type: string
          format: uuid
          nullable: true
        permission_policies:
          type: object

    UpdatePasswordRequest:
      type: object
      required:
        - new_password
      properties:
        current_password:
          type: string
          format: password
          description: "Senha atual (obrigatória para usuários não-ROOT, opcional para ROOT)"
        new_password:
          type: string
          format: password
          minLength: 8
          description: "Nova senha (obrigatória para todos)"

    AppendPolicyCitiesRequest:
      type: object
      required:
        - city_ids
      properties:
        city_ids:
          type: array
          items:
            type: string
            format: uuid

    # --- City Schemas ---
    City:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "PORTO VELHO"
        state:
          type: string
          example: "RO"
        battalion:
          type: string
          example: "1ºBPM"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        is_deleted:
          type: boolean

    CreateCityRequest:
      type: object
      required:
        - name
        - state
        - battalion
      properties:
        name:
          type: string
          example: "ARIQUEMES"
        state:
          type: string
          enum: ["RO"]
        battalion:
          type: string
          example: "2ºBPM"

    UpdateCityRequest:
      type: object
      required:
        - name
        - state
        - battalion
      properties:
        name:
          type: string
        state:
          type: string
          enum: ["RO"]
        battalion:
          type: string

    # --- Enums ---
    PhoneType:
      type: string
      enum:
        - "Mobile"
        - "Residential"
        - "Work"
      description: "Tipo de telefone"

    ViolenceType:
      type: string
      enum:
        - "Physical"
        - "Sexual"
        - "Psychological"
        - "Moral"
      description: "Tipo de violência sofrida pela vítima"

    HasChildren:
      type: string
      enum:
        - "Yes"
        - "No"
        - "Pregnant"
      description: "Status de filhos da vítima"

    SecurityForce:
      type: string
      enum:
        - "Military Police"
        - "Civil Police"
        - "Penal Police"
        - "Fire Department"
        - "Federal Highway Police"
        - "Federal Police"
        - "Municipal Guard"
      description: "Força de segurança do agressor (quando aplicável)"

    RelationshipToVictim:
      type: string
      enum:
        - "Spouse"
        - "Ex-Spouse"
        - "Mother"
        - "Father"
        - "Stepfather"
        - "Stepmother"
        - "Son/Daughter"
        - "Sibling"
        - "Cousin"
        - "Grandfather"
        - "Grandmother"
        - "Brother/Sister-in-law"
        - "Father/Mother-in-law"
        - "Son-in-law"
        - "Daughter-in-law"
        - "Uncle/Aunt"
      description: "Relacionamento do agressor com a vítima"

    EducationLevel:
      type: string
      enum:
        - "Elementary"
        - "High School"
        - "College"
        - "Postgraduate"
      description: "Nível de escolaridade do agressor"

    # --- Victim Schemas ---
    VictimPhone:
      type: object
      properties:
        id:
          type: string
          format: uuid
        phone:
          type: string
          example: "(69) 99999-8888"
        phone_type:
          $ref: "#/components/schemas/PhoneType"

    PhoneData:
      type: object
      required:
        - phone
      properties:
        phone:
          type: string
          example: "(69) 99999-8888"
        phone_type:
          $ref: "#/components/schemas/PhoneType"

    Victim:
      type: object
      properties:
        id:
          type: string
          format: uuid
        full_name:
          type: string
        cpf:
          type: string
          nullable: true
        birth_date:
          type: string
          format: date
          nullable: true
        city_id:
          type: string
          format: uuid
        education_level:
          type: string
          nullable: true
          example: "Superior Completo"
        occupation:
          type: string
          nullable: true
          example: "Professora"
        workplace:
          type: string
          nullable: true
          example: "Escola Municipal"
        violence_type:
          $ref: "#/components/schemas/ViolenceType"
        has_children:
          $ref: "#/components/schemas/HasChildren"
        children_count:
          type: integer
          nullable: true
          example: 2
        has_special_needs:
          type: boolean
        special_needs_type:
          type: string
          nullable: true
        uses_alcohol:
          type: boolean
        uses_drugs:
          type: boolean
        has_psychiatric_issues:
          type: boolean
        psychiatric_issues_type:
          type: string
          nullable: true
        phones:
          type: array
          items:
            $ref: "#/components/schemas/VictimPhone"
        addresses:
          type: array
          items:
            $ref: "#/components/schemas/VictimAddress"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        is_deleted:
          type: boolean

    VictimAddress:
      type: object
      required:
        - city_id
      properties:
        id:
          type: string
          format: uuid
        street:
          type: string
          nullable: true
        number:
          type: string
          nullable: true
        district:
          type: string
          nullable: true
        city_id:
          type: string
          format: uuid
        zip_code:
          type: string
          nullable: true
        complement:
          type: string
          nullable: true

    AddressData:
      type: object
      required:
        - city_id
      properties:
        street:
          type: string
          nullable: true
        number:
          type: string
          nullable: true
        district:
          type: string
          nullable: true
        city_id:
          type: string
          format: uuid
        zip_code:
          type: string
          nullable: true
        complement:
          type: string
          nullable: true

    CreateVictimRequest:
      type: object
      required:
        - full_name
        - city_id
        - violence_type
        - has_children
        - has_special_needs
        - uses_alcohol
        - uses_drugs
        - has_psychiatric_issues
      properties:
        full_name:
          type: string
        cpf:
          type: string
          nullable: true
        birth_date:
          type: string
          format: date
          nullable: true
        city_id:
          type: string
          format: uuid
        phones:
          type: array
          items:
            $ref: "#/components/schemas/PhoneData"
          nullable: true
        addresses:
          type: array
          items:
            $ref: "#/components/schemas/AddressData"
          nullable: true
        education_level:
          type: string
          nullable: true
        occupation:
          type: string
          nullable: true
        workplace:
          type: string
          nullable: true
        violence_type:
          $ref: "#/components/schemas/ViolenceType"
        has_children:
          $ref: "#/components/schemas/HasChildren"
        children_count:
          type: integer
          nullable: true
        has_special_needs:
          type: boolean
        special_needs_type:
          type: string
          nullable: true
        uses_alcohol:
          type: boolean
        uses_drugs:
          type: boolean
        has_psychiatric_issues:
          type: boolean
        psychiatric_issues_type:
          type: string
          nullable: true

    UpdateVictimRequest:
      type: object
      required:
        - full_name
        - city_id
        - violence_type
        - has_children
        - has_special_needs
        - uses_alcohol
        - uses_drugs
        - has_psychiatric_issues
      properties:
        full_name:
          type: string
        cpf:
          type: string
          nullable: true
        birth_date:
          type: string
          format: date
          nullable: true
        city_id:
          type: string
          format: uuid
        phones:
          type: array
          items:
            $ref: "#/components/schemas/PhoneData"
          nullable: true
        addresses:
          type: array
          items:
            $ref: "#/components/schemas/AddressData"
          nullable: true
        education_level:
          type: string
          nullable: true
        occupation:
          type: string
          nullable: true
        workplace:
          type: string
          nullable: true
        violence_type:
          $ref: "#/components/schemas/ViolenceType"
        has_children:
          $ref: "#/components/schemas/HasChildren"
        children_count:
          type: integer
          nullable: true
        has_special_needs:
          type: boolean
        special_needs_type:
          type: string
          nullable: true
        uses_alcohol:
          type: boolean
        uses_drugs:
          type: boolean
        has_psychiatric_issues:
          type: boolean
        psychiatric_issues_type:
          type: string
          nullable: true

    # --- Offender Schemas ---
    OffenderPhone:
      type: object
      properties:
        id:
          type: string
          format: uuid
        phone:
          type: string
          example: "(69) 99999-8888"
        phone_type:
          $ref: "#/components/schemas/PhoneType"

    OffenderAddress:
      type: object
      required:
        - city_id
      properties:
        id:
          type: string
          format: uuid
        street:
          type: string
          nullable: true
        number:
          type: string
          nullable: true
        district:
          type: string
          nullable: true
        city_id:
          type: string
          format: uuid
        zip_code:
          type: string
          nullable: true
        complement:
          type: string
          nullable: true

    OffenderWorkAddress:
      type: object
      required:
        - city_id
      properties:
        id:
          type: string
          format: uuid
        street:
          type: string
          nullable: true
        number:
          type: string
          nullable: true
        district:
          type: string
          nullable: true
        city_id:
          type: string
          format: uuid
        zip_code:
          type: string
          nullable: true
        complement:
          type: string
          nullable: true

    WorkAddressData:
      type: object
      required:
        - city_id
      properties:
        street:
          type: string
          nullable: true
        number:
          type: string
          nullable: true
        district:
          type: string
          nullable: true
        city_id:
          type: string
          format: uuid
        zip_code:
          type: string
          nullable: true
        complement:
          type: string
          nullable: true

    Offender:
      type: object
      properties:
        id:
          type: string
          format: uuid
        full_name:
          type: string
        cpf:
          type: string
          nullable: true
        birth_date:
          type: string
          format: date
          nullable: true
        city_id:
          type: string
          format: uuid
        victim_id:
          type: string
          format: uuid
        imprisoned:
          type: boolean
        occupation:
          type: string
          nullable: true
        workplace:
          type: string
          nullable: true
        is_public_security_agent:
          type: boolean
        security_force:
          allOf:
            - $ref: "#/components/schemas/SecurityForce"
          nullable: true
        relationship_to_victim:
          $ref: "#/components/schemas/RelationshipToVictim"
        uses_alcohol:
          type: boolean
        uses_drugs:
          type: boolean
        has_psychiatric_issues:
          type: boolean
        psychiatric_issues_type:
          type: string
          nullable: true
        was_drunk_during_assault:
          type: boolean
        education_level:
          $ref: "#/components/schemas/EducationLevel"
        assaults_children:
          type: boolean
          description: "Indica se o agressor agride os filhos"
        observation:
          type: string
          nullable: true
        phones:
          type: array
          items:
            $ref: "#/components/schemas/OffenderPhone"
        addresses:
          type: array
          items:
            $ref: "#/components/schemas/OffenderAddress"
        work_addresses:
          type: array
          items:
            $ref: "#/components/schemas/OffenderWorkAddress"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        is_deleted:
          type: boolean

    CreateOffenderRequest:
      type: object
      required:
        - full_name
        - city_id
        - victim_id
        - imprisoned
        - is_public_security_agent
        - relationship_to_victim
        - uses_alcohol
        - uses_drugs
        - has_psychiatric_issues
        - was_drunk_during_assault
        - education_level
        - assaults_children
      properties:
        full_name:
          type: string
          example: "João da Silva Santos"
        cpf:
          type: string
          nullable: true
          example: "123.456.789-00"
        birth_date:
          type: string
          format: date
          nullable: true
        city_id:
          type: string
          format: uuid
        victim_id:
          type: string
          format: uuid
        imprisoned:
          type: boolean
        occupation:
          type: string
          nullable: true
          example: "Mecânico"
        workplace:
          type: string
          nullable: true
          example: "Oficina Silva Auto Peças"
        is_public_security_agent:
          type: boolean
        security_force:
          allOf:
            - $ref: "#/components/schemas/SecurityForce"
          nullable: true
        relationship_to_victim:
          $ref: "#/components/schemas/RelationshipToVictim"
        uses_alcohol:
          type: boolean
        uses_drugs:
          type: boolean
        has_psychiatric_issues:
          type: boolean
        psychiatric_issues_type:
          type: string
          nullable: true
        was_drunk_during_assault:
          type: boolean
        education_level:
          $ref: "#/components/schemas/EducationLevel"
          example: "High School"
        assaults_children:
          type: boolean
          description: "Indica se o agressor agride os filhos"
          example: false
        observation:
          type: string
          nullable: true
        phones:
          type: array
          items:
            $ref: "#/components/schemas/PhoneData"
          nullable: true
        addresses:
          type: array
          items:
            $ref: "#/components/schemas/AddressData"
          nullable: true
        work_addresses:
          type: array
          items:
            $ref: "#/components/schemas/WorkAddressData"
          nullable: true

    UpdateOffenderRequest:
      type: object
      required:
        - full_name
        - city_id
        - victim_id
        - imprisoned
        - is_public_security_agent
        - relationship_to_victim
        - uses_alcohol
        - uses_drugs
        - has_psychiatric_issues
        - was_drunk_during_assault
        - education_level
        - assaults_children
      properties:
        full_name:
          type: string
        cpf:
          type: string
          nullable: true
        birth_date:
          type: string
          format: date
          nullable: true
        city_id:
          type: string
          format: uuid
        victim_id:
          type: string
          format: uuid
        imprisoned:
          type: boolean
        occupation:
          type: string
          nullable: true
        workplace:
          type: string
          nullable: true
        is_public_security_agent:
          type: boolean
        security_force:
          allOf:
            - $ref: "#/components/schemas/SecurityForce"
          nullable: true
        relationship_to_victim:
          $ref: "#/components/schemas/RelationshipToVictim"
        uses_alcohol:
          type: boolean
        uses_drugs:
          type: boolean
        has_psychiatric_issues:
          type: boolean
        psychiatric_issues_type:
          type: string
          nullable: true
        was_drunk_during_assault:
          type: boolean
        education_level:
          $ref: "#/components/schemas/EducationLevel"
        assaults_children:
          type: boolean
          description: "Indica se o agressor agride os filhos"
        observation:
          type: string
          nullable: true
        phones:
          type: array
          items:
            $ref: "#/components/schemas/PhoneData"
          nullable: true
        addresses:
          type: array
          items:
            $ref: "#/components/schemas/AddressData"
          nullable: true
        work_addresses:
          type: array
          items:
            $ref: "#/components/schemas/WorkAddressData"
          nullable: true

    # --- Protective Measure Schemas ---
    ProtectiveMeasure:
      type: object
      properties:
        id:
          type: string
          format: uuid
        process_number:
          type: string
        sei_process_number:
          type: string
          nullable: true
          description: "Número do processo no sistema SEI"
        issued_at:
          type: string
          format: date
        valid_until:
          type: string
          format: date
          nullable: true
          description: "Data de validade da medida protetiva"
        judicial_authority:
          type: string
        court_district_id:
          type: string
          format: uuid
        distance_meters:
          type: integer
          nullable: true
          description: "Distância em metros que o agressor deve manter da vítima"
        is_active:
          type: boolean
        victim_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        is_deleted:
          type: boolean

    CreateProtectiveMeasureRequest:
      type: object
      required:
        - process_number
        - issued_at
        - judicial_authority
        - court_district_id
        - is_active
        - victim_id
      properties:
        process_number:
          type: string
          example: "12345-67.2025.8.26.0000"
        sei_process_number:
          type: string
          nullable: true
          example: "SEI-2025/001234"
        issued_at:
          type: string
          format: date
        valid_until:
          type: string
          format: date
          nullable: true
        judicial_authority:
          type: string
        court_district_id:
          type: string
          format: uuid
        distance_meters:
          type: integer
          nullable: true
          example: 500
        is_active:
          type: boolean
        victim_id:
          type: string
          format: uuid

    UpdateProtectiveMeasureRequest:
      type: object
      required:
        - process_number
        - issued_at
        - judicial_authority
        - court_district_id
        - is_active
        - victim_id
      properties:
        process_number:
          type: string
        sei_process_number:
          type: string
          nullable: true
        issued_at:
          type: string
          format: date
        valid_until:
          type: string
          format: date
          nullable: true
        judicial_authority:
          type: string
        court_district_id:
          type: string
          format: uuid
        distance_meters:
          type: integer
          nullable: true
        is_active:
          type: boolean
        victim_id:
          type: string
          format: uuid

    # --- Extension Schemas ---
    ProtectiveMeasureExtension:
      type: object
      properties:
        id:
          type: string
          format: uuid
        protective_measure_id:
          type: string
          format: uuid
        extension_number:
          type: integer
          description: "Número da prorrogação (1ª, 2ª, 3ª, etc.)"
          example: 1
        extension_date:
          type: string
          format: date
          description: "Data em que a prorrogação foi concedida"
        new_valid_until:
          type: string
          format: date
          nullable: true
          description: "Nova data de validade após a prorrogação"
        notes:
          type: string
          nullable: true
          description: "Observações sobre a prorrogação"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        is_deleted:
          type: boolean

    CreateExtensionRequest:
      type: object
      required:
        - extension_number
        - extension_date
      properties:
        extension_number:
          type: integer
          example: 1
        extension_date:
          type: string
          format: date
        new_valid_until:
          type: string
          format: date
          nullable: true
        notes:
          type: string
          nullable: true

    UpdateExtensionRequest:
      type: object
      required:
        - extension_number
        - extension_date
      properties:
        extension_number:
          type: integer
        extension_date:
          type: string
          format: date
        new_valid_until:
          type: string
          format: date
          nullable: true
        notes:
          type: string
          nullable: true

    ProtectiveMeasureWithExtensions:
      type: object
      allOf:
        - $ref: "#/components/schemas/ProtectiveMeasure"
        - type: object
          properties:
            extensions:
              type: array
              items:
                $ref: "#/components/schemas/ProtectiveMeasureExtension"

    # --- Attendance Schemas ---
    Attendance:
      type: object
      properties:
        id:
          type: string
          format: uuid
        victim_id:
          type: string
          format: uuid
        was_victim_present:
          type: boolean
        attendance_date:
          type: string
          format: date
        attendance_time:
          type: string
          format: time
        description:
          type: string
          nullable: true
        latitude:
          type: number
          format: double
          nullable: true
        longitude:
          type: number
          format: double
          nullable: true
        address:
          $ref: "#/components/schemas/AttendanceAddress"
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        is_deleted:
          type: boolean

    AttendanceAddress:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: "ID do endereço do atendimento"
        street:
          type: string
          nullable: true
        number:
          type: string
          nullable: true
        district:
          type: string
          nullable: true
        city_id:
          type: string
          format: uuid
          nullable: true
        zip_code:
          type: string
          nullable: true
        complement:
          type: string
          nullable: true

    AttendanceAddressData:
      type: object
      description: "Dados de endereço para criar/atualizar attendance"
      properties:
        street:
          type: string
          nullable: true
        number:
          type: string
          nullable: true
        district:
          type: string
          nullable: true
        city_id:
          type: string
          format: uuid
          nullable: true
        zip_code:
          type: string
          nullable: true
        complement:
          type: string
          nullable: true

    CreateAttendanceRequest:
      type: object
      required:
        - victim_id
        - was_victim_present
        - attendance_date
        - attendance_time
      properties:
        victim_id:
          type: string
          format: uuid
        was_victim_present:
          type: boolean
        attendance_date:
          type: string
          format: date
        attendance_time:
          type: string
          format: time
        description:
          type: string
          nullable: true
        latitude:
          type: number
          format: double
          nullable: true
        longitude:
          type: number
          format: double
          nullable: true
        address:
          $ref: "#/components/schemas/AttendanceAddressData"
          nullable: true

    UpdateAttendanceRequest:
      type: object
      required:
        - victim_id
        - was_victim_present
        - attendance_date
        - attendance_time
      properties:
        victim_id:
          type: string
          format: uuid
        was_victim_present:
          type: boolean
        attendance_date:
          type: string
          format: date
        attendance_time:
          type: string
          format: time
        description:
          type: string
          nullable: true
        latitude:
