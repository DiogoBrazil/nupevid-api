    # --- Protective Measure Schemas ---
    ProtectiveMeasure:
      type: object
      properties:
        id:
          type: string
          format: uuid
        process_number:
          type: string
        sei_process_number:
          type: string
          nullable: true
          description: "Número do processo no sistema SEI"
        occurrence_report_number:
          type: string
          nullable: true
          description: "Número do boletim de ocorrência"
        issued_at:
          type: string
          format: date
        valid_until:
          type: string
          format: date
          nullable: true
          description: "Data de validade da medida protetiva"
        judicial_authority:
          type: string
        court_district_id:
          type: string
          format: uuid
        distance_meters:
          type: integer
          nullable: true
          description: "Distância em metros que o agressor deve manter da vítima"
        status:
          $ref: "#/components/schemas/ProtectiveMeasureStatus"
        violence_types:
          type: array
          items:
            $ref: "#/components/schemas/ViolenceType"
        relationship_to_victim:
          $ref: "#/components/schemas/RelationshipToVictim"
        assaults_children:
          type: boolean
          description: "Indica se o agressor agride os filhos"
        was_drunk_during_assault:
          type: boolean
        victim_id:
          type: string
          format: uuid
        offender_id:
          type: string
          format: uuid
          description: "ID do agressor associado à medida protetiva"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        is_deleted:
          type: boolean

    CreateProtectiveMeasureRequest:
      type: object
      required:
        - process_number
        - issued_at
        - judicial_authority
        - court_district_id
        - status
        - violence_types
        - relationship_to_victim
        - assaults_children
        - was_drunk_during_assault
        - victim_id
        - offender_id
      properties:
        process_number:
          type: string
          example: "12345-67.2025.8.26.0000"
        sei_process_number:
          type: string
          nullable: true
          example: "SEI-2025/001234"
        occurrence_report_number:
          type: string
          nullable: true
          example: "BO-2025/001234"
          description: "Número do boletim de ocorrência"
        issued_at:
          type: string
          format: date
        valid_until:
          type: string
          format: date
          nullable: true
        judicial_authority:
          type: string
        court_district_id:
          type: string
          format: uuid
        distance_meters:
          type: integer
          nullable: true
