              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  data:
                    type: array
                    items:
                      oneOf:
                        - $ref: "#/components/schemas/WorkSessionWithMembers"
                        - $ref: "#/components/schemas/WorkSessionWithMembersComplement"
                  page:
