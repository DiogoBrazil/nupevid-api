                error: "Bad Request"
                message: "Bad Request: CITY_ADMIN already exists for this city"
                status_code: 400
        "401":
          description: "Token JWT ausente, inválido ou expirado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Unauthorized"
                message: "Unauthorized"
                status_code: 401
        "403":
          description: "Sem permissão para atualizar este usuário"
          content:
            application/json:
              schema:
