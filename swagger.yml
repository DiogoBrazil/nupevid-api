          nullable: true

paths:
  # === AUTH ENDPOINTS ===
  /auth/login:
    post:
      tags:
        - "Auth"
      summary: "Realizar login no sistema"
      description: "Autentica um usuário e retorna um token JWT válido por tempo configurado"
      operationId: "authLogin"
      security:
        - api_key: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: "Login realizado com sucesso"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: "Credenciais inválidas"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # === USER ENDPOINTS ===
  /users:
    get:
      tags:
        - "Users"
      summary: "Listar todos os usuários"
      description: "Retorna lista de usuários com filtros baseados nas permissões do usuário autenticado"
      operationId: "getAllUsers"
      security:
        - bearerAuth: []
          api_key: []
      responses:
        "200":
          description: "Lista de usuários retornada com sucesso"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"

    post:
      tags:
        - "Users"
      summary: "Criar novo usuário"
      description: "Cria um novo usuário no sistema. Apenas ROOT e CITY_ADMIN podem criar usuários"
      operationId: "createUser"
      security:
        - bearerAuth: []
          api_key: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: "Usuário criado com sucesso"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 201
                  data:
                    $ref: "#/components/schemas/User"
        "400":
          description: "Dados inválidos"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: "Sem permissão para criar usuários"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /users/{id}:
    parameters:
      - name: "id"
        in: "path"
        required: true
        schema:
          type: string
          format: uuid
        description: "ID do usuário"

    get:
      tags:
        - "Users"
      summary: "Obter usuário por ID"
      description: "Retorna detalhes de um usuário específico"
      operationId: "getUserById"
      security:
        - bearerAuth: []
          api_key: []
      responses:
        "200":
          description: "Usuário encontrado"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  data:
                    $ref: "#/components/schemas/User"
        "404":
          description: "Usuário não encontrado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      tags:
        - "Users"
      summary: "Atualizar usuário"
      description: "Atualiza informações de um usuário existente"
      operationId: "updateUser"
      security:
        - bearerAuth: []
          api_key: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: "Usuário atualizado com sucesso"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  data:
                    $ref: "#/components/schemas/User"
        "400":
          description: "Dados inválidos"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: "Usuário não encontrado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      tags:
        - "Users"
      summary: "Deletar usuário (soft delete)"
      description: "Realiza soft delete de um usuário"
      operationId: "deleteUser"
      security:
        - bearerAuth: []
          api_key: []
      responses:
        "200":
          description: "Usuário deletado com sucesso"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  data:
                    $ref: "#/components/schemas/User"
        "404":
          description: "Usuário não encontrado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /users/{id}/password:
    parameters:
      - name: "id"
        in: "path"
        required: true
        schema:
          type: string
          format: uuid
        description: "ID do usuário"

    patch:
      tags:
        - "Users"
      summary: "Atualizar senha do usuário"
      description: |
        Atualiza a senha de um usuário.

        **Regras:**
        - Usuários comuns: podem atualizar apenas sua própria senha e DEVEM fornecer a senha atual
        - ROOT: pode atualizar senha de qualquer usuário SEM precisar fornecer a senha atual
      operationId: "updateUserPassword"
      security:
        - bearerAuth: []
          api_key: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePasswordRequest"
            examples:
              usuario_comum:
                summary: "Usuário comum alterando sua própria senha"
                value:
                  current_password: "SenhaAtual123!"
                  new_password: "NovaSenha456!"
              usuario_root:
                summary: "ROOT alterando senha de outro usuário"
                value:
                  new_password: "NovaSenhaDefinidaPeloRoot123!"
      responses:
        "200":
          description: "Senha atualizada com sucesso"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  data:
                    $ref: "#/components/schemas/User"
        "400":
          description: "Senha atual incorreta ou dados inválidos"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /users/{id}/policies/{policy}/cities:
    parameters:
      - name: "id"
        in: "path"
        required: true
        schema:
          type: string
          format: uuid
        description: "ID do usuário"
      - name: "policy"
        in: "path"
        required: true
        schema:
          type: string
        description: "Nome da política (ex: read_victims, create_victims, etc)"

    post:
      tags:
        - "Users"
      summary: "Adicionar cidades a uma política de usuário"
      description: "Adiciona permissões de cidades específicas a uma política de um usuário"
      operationId: "appendUserPolicyCities"
      security:
        - bearerAuth: []
          api_key: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppendPolicyCitiesRequest"
      responses:
        "200":
          description: "Políticas atualizadas com sucesso"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  data:
                    $ref: "#/components/schemas/User"
        "400":
          description: "Política inválida"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: "Sem permissão para modificar políticas"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      tags:
        - "Users"
      summary: "Remover cidades de uma política de usuário"
      description: "Remove permissões de cidades específicas de uma política de um usuário"
      operationId: "removeUserPolicyCities"
      security:
        - bearerAuth: []
          api_key: []
