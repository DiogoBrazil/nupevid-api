          required: false
          schema:
            type: boolean
            example: false
          description: "Quando true, inclui entidades relacionadas completas (victim, offender, court_district) sem created_at/updated_at"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProtectiveMeasureRequest"
      responses:
        "201":
          description: "Medida protetiva criada com sucesso"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 201
                  data:
                    oneOf:
                      - $ref: "#/components/schemas/ProtectiveMeasure"
                      - $ref: "#/components/schemas/ProtectiveMeasureWithExtensionsAndEntities"
        "400":
          description: "Dados inválidos ou vítima já possui medida ativa"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Bad Request"
                message: "Bad Request: victim already has an active protective measure"
                status_code: 400
        "401":
          description: "Token JWT ausente, inválido ou expirado"
          content:
